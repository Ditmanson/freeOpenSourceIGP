{{ define "main" }}
<div class="fixed-grid">
  <div class="grid">
    <div class="cell">
      <div class="section">
        <h2>{{ .Title }} </h2>
        <ul>
          {{ range .Pages.ByDate.Reverse }}
          <div class="box">
            <a class="button" href="{{ .RelPermalink }}">{{.Date.Format "02 Jan 2026" }} : {{ .Title }}</a>
          </div>
          {{ end }}
        </ul>
      </div>

    </div>
    <div class="cell">
      <section class="section">
        <div class="block">
          {{ .Content }}
        </div>

      </section>

    </div>
  </div>
</div>


{{ end }}
